<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MolCal Structure</title>

    <!-- RDKit.js from CDN -->
    <script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>

    <!-- JSME molecule editor from CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsme-editor/jsme.nocache.js">
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 16px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .draw-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-top: 16px;
            margin-bottom: 16px;
        }

        #jsme_container {
            flex: 1;
            min-width: 600px;
            height: 450px;
            border: 1px solid #ccc;
        }

        .draw-controls {
            width: 260px;
        }

        .draw-controls button {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 8px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Coloured buttons */
        #jsmeUseForMwBtn {
            background-color: #42aad0;
            /* blue */
            color: white;
        }

        #calcBtn {
            background-color: #3cccd6;
            /* green */
            color: white;
        }

        .draw-controls button:hover {
            opacity: 0.9;
        }

        .draw-controls input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            margin-top: 4px;
            margin-bottom: 8px;
            padding: 6px 8px;
        }

        .draw-controls hr {
            margin: 16px 0;
        }
    </style>




    <script>
        function jsmeOnLoad() {
            console.log('JSME loaded');
            window.jsmeApplet = new JSApplet.JSME(
                "jsme_container",
                "100%",
                "100%",
                { options: "newlook,zoom,hydrogens" }
            );
        }
    </script>

</head>

<body>
    <h1>MolCal structure</h1>

    <!-- Drawing area (JSME) -->
    <h2>Draw Molecule</h2>

    <div class="draw-row">
        <div id="jsme_container"></div>

        <div class="draw-controls">
            <!-- From drawing -->
            <button id="jsmeUseForMwBtn">Structure → MW</button>

            <hr>

            <!-- SMILES input on the right -->
            <h3> Enter SMILES </h3>
            <label for="smiles">SMILES Code (e.g. c1ccccc1):</label>
            <input type="text" id="smiles" />
            <button id="calcBtn">SMILES → MW</button>

            <p id="result"></p>
        </div>
    </div>
    <hr>

    <div id="conditions-row" style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;">
        <div>
            <label>Temperature (°C): </label>
            <input type="text" id="tempInput" placeholder="25">
        </div>
        <div>
            <label>Time: </label>
            <input type="text" id="timeInput" placeholder="2 h">
        </div>
        <div>
            <label>Solvent: </label>
            <input type="text" id="solventInput" placeholder="DMF">
        </div>
    </div>

    <hr>

    <div id="reaction-strip" style="margin-top:16px; display:flex; flex-direction:column; gap:12px;">

        <!-- Row with buttons -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h3>Reactants</h3>
                <input type="text" id="reactantNameInput" placeholder="Reactant name"
                    style="margin-bottom:4px; display:block;">
                <button id="addReactantBtn">Add reactant from editor</button>
            </div>

            <div style="text-align:center;">
                <div style="font-size:24px; margin-bottom:4px;">→</div>
                <button id="exportSchemeBtn">Export scheme (PNG)</button>
            </div>

            <div>
                <h3>Products</h3>
                <input type="text" id="productNameInput" placeholder="Product name"
                    style="margin-bottom:4px; display:block;">
                <button id="addProductBtn">Add product from editor</button>
            </div>
        </div>

        <!-- Row with lists -->
        <div style="display:flex; gap:16px; align-items:flex-start;">
            <div id="reactantsList" style="flex:1;"></div>
            <div id="productsList" style="flex:1;"></div>
        </div>
    </div>

    <!-- Your app logic -->
    <script src="app.js"></script>
</body>

</html>
